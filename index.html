        </section>
        <section id="adoption" class="adoption">
            <div class="adoption-carousel d-flex h-100">
                <div class="adoption-botoes d-flex w-100 justify-content-between align-items-center mx-5">
                    <button><span><img src="./assets/imgs/icons/seta.svg" alt=""></span></button>
                    <button><span><img style="transform: translateY(90deg);"  src="./assets/imgs/icons/seta.svg" alt=""></span></button>
                </div>
                <div class="adoption-card w-100 h-100">
                    
                </div>
            </div>
        </section>
    </main>
