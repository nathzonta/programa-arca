<!DOCTYPE html>
<html lang="pt-BBR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Instituição - Programa Arca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css"/>
    <link rel="stylesheet" href="./assets/css/cadastro_instituicao.css"/>
    <link rel="stylesheet" href="./assets/css/forms.css"/>
    <link rel="shortcut icon" href="./assets/imgs/prefeitura.png" type="image/x-icon">
</head>
<body>
    <main class="cadastro-container d-flex">
        <div class="cadastro-image p-4 col-lg-6 d-lg-flex d-none align-items-center">
            <img src="./assets/imgs/gato-lg.png" alt="Gatos">
        </div>
        <div class="cadastro-content col-lg-6 col-12 py-3 pe-4">
            <div class="cadastro-header text-center mb-3">
                <a href="./index.html"><img src="./assets/imgs/Logo.svg" alt="Logo Programa Arca" class="cadastro-logo"></a>
                <h3 class="cadastro-title">Cadastro de Instituição</h3>
            </div>
            <div class="cadastro-card">
                <div class="cadastro-card-header">
                    <div class="cadastro-card-text">
                        <p class="corpo m-0">Cadastre sua organização</p>
                        <p class="corpo corpo-sm">
                            Já tem uma conta? Faça login no botão <span class="d-lg-inline-block d-none">ao lado.</span><span class="d-lg-none d-inline-block">abaixo.</span><br>
                            Você é um cidadão comum? Se cadastre no botão <span class="d-lg-inline-block d-none">ao lado.</span><span class="d-lg-none d-inline-block">abaixo.</span>
                        </p>
                    </div>
                    <div class="cadastro-card-links">
                        <a class="corpo corpo-sm" href="./login.html">Login</a>
                        <a class="corpo corpo-sm" href="./cadastro.html">Cadastrar-se como cidadão</a>
                    </div>
                </div>
                <form class="cadastro-form row g-md-3 cadastro-form justify-content-end" method="post">
                        <div class="form-group-arca col-md-6 col-12">
                            <label for="nome-instituicao">Nome da Instituição</label>
                            <input type="text" id="nome-instituicao" name="nome-instituicao" placeholder="Digite o nome da instituição">
                        </div>
                        <div class="form-group-arca col-md-6 col-12">
                            <label for="nome-fantasia">Nome Fantasia</label>
                            <input type="text" id="nome-fantasia" name="nome-fantasia" placeholder="Digite o nome fantasia da instituição">
                        </div>
                        <div class="form-group-arca col-md-5 col-12">
                            <label for="tipo-instituicao">Tipo de Instituição</label>
                            <select id="tipo-instituicao" name="tipo-instituicao">
                                <option value="ONG">ONG</option>
                                <option value="protetor">Protetor independente</option>
                                <option value="abrigo">Abrigo</option>
                                <option value="projeto">Projeto Social</option>
                            </select>
                            <div class="select-arca" data-select="tipo-instituicao"></div>
                        </div>
                        <div class="form-group-arca col-md-4 col-12">
                            <label for="cnpj">CNPJ</label>
                            <input type="text" id="cnpj" name="cnpj" placeholder="12.345.678/1234-56">
                        </div>
                        <div class="form-group-arca col-md-3 col-12">
                            <label for="data-fundacao">Data de Fundação</label>
                            <input type="text" id="data-fundacao" name="data-fundacao" placeholder="DD/MM/AAAA">
                        </div>
                        <div class="form-group-arca col-md-3 col-12">
                            <label for="cep">CEP</label>
                            <input type="text" id="cep" name="cep" placeholder="12345-678">
                        </div>
                        <div class="form-group-arca col-md-6 col-12">
                            <label for="rua">Rua</label>
                            <input type="text" id="rua" name="rua" placeholder="Rua Exemplo">
                        </div>
                        <div class="form-group-arca col-md-3 col-12">
                            <label for="numero">Número</label>
                            <input type="text" id="numero" name="numero" placeholder="123">
                        </div>
                        <div class="form-group-arca col-md-4 col-12">
                            <label for="bairro">Bairro</label>
                            <input type="text" id="bairro" name="bairro" placeholder="Bairro Exemplo">
                        </div>
                        <div class="form-group-arca col-md-4 col-12">
                            <label for="celular">Celular de contato</label>
                            <input type="tel" id="celular" name="celular" placeholder="(27) 99999-9999">
                        </div>
                        <div class="form-group-arca col-md-4 col-12">
                            <label for="email">E-mail de contato</label>
                            <input type="email" id="email" name="email" placeholder="exemplo@exemplo.com">
                        </div>
                        <div class="mt-4 mt-md-5 col-md-2 col-6 mb-2">
                            <button type="button" onclick="history.back()">Voltar</button>
                        </div>
                        <div class="mt-4 mt-md-5 col-md-4 col-6 mb-2">
                            <button type="submit">Finalizar cadastro</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./assets/js/funcoes.js"></script>
    <script src="./assets/js/conexao_bd.js"></script>
    <script src="./assets/js/select.js"></script>
    <script src="./assets/js/registro.js"></script>
</body>
</html>
